<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="fas fa-calendar-alt me-2"></i>Gestión de Citas</h2>
    <button class="btn btn-primary" routerLink="/citas/nueva">
      <i class="fas fa-plus me-2"></i>Nueva Cita
    </button>
  </div>

  <div class="card shadow">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Odontólogo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let cita of citas">
              <td>{{ cita.id }}</td>
              <td>{{ cita.pacienteNombre }}</td>
              <td>{{ cita.odontologoNombre }}</td>
              <td>{{ cita.fecha | date:'dd/MM/yyyy' }}</td>
              <td>{{ cita.hora }}</td>
              <td>
                <span class="badge" [ngClass]="{
                  'bg-warning text-dark': cita.estado === 'PENDIENTE',
                  'bg-success': cita.estado === 'CONFIRMADA',
                  'bg-danger': cita.estado === 'CANCELADA'
                }">
                  {{ cita.estado || 'PENDIENTE' }}
                </span>
              </td>
              <td class="text-center">
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-info" [routerLink]="['/citas', cita.id]" title="Ver detalle">
                    <i class="fas fa-eye"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-warning" [routerLink]="['/citas/editar', cita.id]" title="Editar">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger" (click)="eliminarCita(cita.id!)" title="Eliminar">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="!loading && citas.length === 0">
              <td colspan="7" class="text-center py-4 text-muted">
                No hay citas programadas actualmente.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
