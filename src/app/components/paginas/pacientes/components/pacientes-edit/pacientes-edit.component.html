<div class="card p-4">
    <h3 *ngIf="!esEdicion">Nuevo Paciente</h3>
    <h3 *ngIf="esEdicion">Editar Paciente</h3>

    <form [formGroup]="pacienteForm" (ngSubmit)="onSubmit()">
        <div class="form-group mb-2">
            <label>Nombre</label>
            <input type="text" class="form-control" formControlName="nombre">
        </div>
        <div class="form-group mb-2">
            <label>Apellido</label>
            <input type="text" class="form-control" formControlName="apellido">
        </div>
      
        <div class="form-group mb-2">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
        </div>
      
        <div class="form-group mb-2">
            <label>Fecha de nacimiento</label>
            <input type="date" class="form-control" formControlName="fechaNacimiento">
        </div>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Estado en Sistema</label>
                    <select class="form-control" formControlName="estado">
                      <option value="">Seleccione...</option>
                      <option value="ACTIVO">Activo</option>
                      <option value="INACTIVO">Inactivo</option>
                      <option value="BLOQUEADO">Bloqueado</option>
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Género</label>
                    <select class="form-control" formControlName="genero">
                      <option value="">Seleccione...</option>
                      <option value="MASCULINO">Masculino</option>
                      <option value="FEMENINO">Femenino</option>
                      <option value="NO_BINARIO">No Binario</option>
                      <option value="GENERO_FLUIDO">Género Fluido</option>
                      <option value="AGENERO">Agénero</option>
                      <option value="PREFIERO_NO_DECIRLO">Prefiero no decirlo</option>
                      <option value="OTRO">Otro</option>
                    </select>
                </div> 
            </div>
        </div>

        <div class="form-group mb-2">
            <label>Teléfono</label>
            <input type="text" class="form-control" formControlName="telefono">
        </div>

        <div class="form-group mb-2">
            <label>Dirección</label>
            <input type="text" class="form-control" formControlName="direccion">
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Identificación</label>
                    <input type="text" class="form-control" formControlName="identificacion">
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>CURP</label>
                    <input type="text" class="form-control" formControlName="curp">
                </div> 
            </div>
        </div>

        <br>

        <button type="submit" class="btn btn-success" [disabled]="pacienteForm.invalid">
            {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
        <button type="button" class="btn btn-secondary ml-2" routerLink="/pacientes">
            Cancelar
        </button>

    </form>
</div>
